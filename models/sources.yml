sources:
  - name: jaffle_shop
    database: raw 
    schema: jaffle_shop
    tables:
      - name: customers
        columns:
          - name: id
            tests:
              - unique 
              - not_null

      - name: orders
        columns:
          - name: id 
            tests:
              - unique 
              - not_null 

        config:
          freshness: 
            warn_after: 
              count: 2
              period: day

            error_after: 
              count: 4
              period: day
          loaded_at_field: _etl_loaded_at
            
  - name: stripe
    database: raw 
    tables: 
      - name: payment

  - name: dbt_learn_jinja
    database: raw 
    tables:
      - name: orders_amazon
      - name: orders_shopify
              